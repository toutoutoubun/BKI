name: release-desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example v0.1.0"
        required: true
        type: string
      macos_signing:
        description: "Enable macOS code signing and notarization. Requires valid Apple secrets."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-release:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS universal
            platform: macos-latest
            artifact_name: macos-universal
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            tauri_args: "--target universal-apple-darwin"
          - name: Linux x64
            platform: ubuntu-22.04
            artifact_name: linux-x64
            rust_targets: ""
            tauri_args: ""
          - name: Windows x64
            platform: windows-latest
            artifact_name: windows-x64
            rust_targets: ""
            tauri_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            release_tag="${{ github.ref_name }}"
          else
            release_tag="${{ inputs.tag }}"
          fi

          macos_signing="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.macos_signing }}" = "true" ]; then
            macos_signing="true"
          fi

          echo "BKI_RELEASE_TAG=${release_tag}" >> "$GITHUB_ENV"
          echo "tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "macos_signing=${macos_signing}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust targets for macOS universal build
        if: matrix.rust_targets != ''
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Test Python sidecar
        run: npm run python:test

      - name: Build and upload non-macOS bundles
        if: ${{ matrix.platform != 'macos-latest' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.BKI_RELEASE_TAG }}
          releaseName: "BKI ${{ env.BKI_RELEASE_TAG }}"
          releaseBody: |
            Desktop installers for BKI.

            Notes:
            - The Python analysis sidecar is bundled as an application resource.
            - A Python runtime must be available on PATH (`python3` on macOS/Linux, `python` on Windows), or set `BKI_PYTHON`.
            - macOS artifacts use ad-hoc signing by default, so no Apple certificate is required. Run this workflow manually with macOS signing enabled after configuring valid Apple secrets to produce Developer ID signed/notarized macOS artifacts.
          releaseDraft: true
          prerelease: ${{ contains(env.BKI_RELEASE_TAG, '-') }}
          args: ${{ matrix.tauri_args }}

      - name: Build and upload ad-hoc signed macOS bundle
        if: ${{ matrix.platform == 'macos-latest' && steps.release.outputs.macos_signing != 'true' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ env.BKI_RELEASE_TAG }}
          releaseName: "BKI ${{ env.BKI_RELEASE_TAG }}"
          releaseBody: |
            Desktop installers for BKI.

            Notes:
            - The Python analysis sidecar is bundled as an application resource.
            - A Python runtime must be available on PATH (`python3` on macOS/Linux, `python` on Windows), or set `BKI_PYTHON`.
            - macOS artifacts use ad-hoc signing by default, so no Apple certificate is required. Gatekeeper may still require users to approve the app manually.
          releaseDraft: true
          prerelease: ${{ contains(env.BKI_RELEASE_TAG, '-') }}
          args: ${{ matrix.tauri_args }}

      - name: Validate Apple signing secrets
        if: ${{ matrix.platform == 'macos-latest' && steps.release.outputs.macos_signing == 'true' }}
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=0
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Build and upload signed macOS bundle
        if: ${{ matrix.platform == 'macos-latest' && steps.release.outputs.macos_signing == 'true' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ env.BKI_RELEASE_TAG }}
          releaseName: "BKI ${{ env.BKI_RELEASE_TAG }}"
          releaseBody: |
            Desktop installers for BKI.

            Notes:
            - The Python analysis sidecar is bundled as an application resource.
            - A Python runtime must be available on PATH (`python3` on macOS/Linux, `python` on Windows), or set `BKI_PYTHON`.
            - macOS signing/notarization was requested for this workflow run.
          releaseDraft: true
          prerelease: ${{ contains(env.BKI_RELEASE_TAG, '-') }}
          args: ${{ matrix.tauri_args }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bki-${{ steps.release.outputs.tag }}-${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.app.tar.gz
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.rpm
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/macos/*.app/**
