name: release-desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example v0.1.0"
        required: true
        type: string
      macos_signing:
        description: "Enable macOS code signing and notarization. Requires valid Apple secrets."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-release:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS universal
            platform: macos-latest
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            tauri-args: "--target universal-apple-darwin"
          - name: Linux x64
            platform: ubuntu-22.04
            rust-targets: ""
            tauri-args: ""
          - name: Windows x64
            platform: windows-latest
            rust-targets: ""
            tauri-args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "BKI_RELEASE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"
          else
            echo "BKI_RELEASE_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust targets for macOS universal build
        if: matrix.rust-targets != ''
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Test Python sidecar
        run: npm run python:test

      - name: Build and upload desktop bundles
        if: ${{ matrix.platform != 'macos-latest' || !inputs.macos_signing }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.BKI_RELEASE_TAG }}
          releaseName: "BKI ${{ env.BKI_RELEASE_TAG }}"
          releaseBody: |
            Desktop installers for BKI.

            Notes:
            - The Python analysis sidecar is bundled as an application resource.
            - A Python runtime must be available on PATH (`python3` on macOS/Linux, `python` on Windows), or set `BKI_PYTHON`.
            - macOS artifacts are unsigned by default. Run this workflow manually with macOS signing enabled after configuring valid Apple secrets to produce signed/notarized macOS artifacts.
          releaseDraft: true
          prerelease: ${{ contains(env.BKI_RELEASE_TAG, '-') }}
          args: ${{ matrix.tauri-args }}

      - name: Validate Apple signing secrets
        if: ${{ matrix.platform == 'macos-latest' && inputs.macos_signing }}
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=0
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Build and upload signed macOS bundle
        if: ${{ matrix.platform == 'macos-latest' && inputs.macos_signing }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ env.BKI_RELEASE_TAG }}
          releaseName: "BKI ${{ env.BKI_RELEASE_TAG }}"
          releaseBody: |
            Desktop installers for BKI.

            Notes:
            - The Python analysis sidecar is bundled as an application resource.
            - A Python runtime must be available on PATH (`python3` on macOS/Linux, `python` on Windows), or set `BKI_PYTHON`.
            - macOS signing/notarization was requested for this workflow run.
          releaseDraft: true
          prerelease: ${{ contains(env.BKI_RELEASE_TAG, '-') }}
          args: ${{ matrix.tauri-args }}
